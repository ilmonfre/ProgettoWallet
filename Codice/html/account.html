<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Account</title>
	<link rel="stylesheet" href="../css/styleAccount.css">
</head>
<body>

    <div class="profile-card">
        <div class="header">
            <span class="avatar">👤</span>
            <h2>Il tuo Profilo</h2>
            <p>Dati personali registrati nel sistema</p>
        </div>

        <div class="info-grid">
            <div class="info-group">
                <span class="label">Nome Completo</span>
                <div class="data-field">Mario Rossi</div>
            </div>

            <div class="info-group">
                <span class="label">Email</span>
                <div class="data-field">mario.rossi@email.it</div>
            </div>

            <div class="info-group">
                <span class="label">Codice Fiscale</span>
                <div class="data-field">RSSMRA80A01H501U</div>
            </div>

            <div class="info-group">
                <span class="label">Data di Nascita</span>
                <div class="data-field">01 / 01 / 1980</div>
            </div>
        </div>

        <div class="actions">
            <a href="#" class="btn-edit">Modifica Dati</a>
            <a href="../html/index.html" class="btn-logout">Esci dall'account</a>
        </div>
    </div>

</body>
</html>
