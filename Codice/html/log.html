<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accedi</title>
    <link rel="stylesheet" href="../css/styleLog.css">
</head>
<body>
    
    <div id="avviso-sveglia" class="custom-toast">
        <span>⏰</span>
        <p>Svegliati!</p>
        <span>⏰</span>
        <a href="#" class="close-toast">×</a>
    </div>

    <div class="login-card">
        <a href="index.html" class="back-home" title="Torna alla Home">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
        </a>

        <div class="header">
            <h2>Bentornato</h2>
            <p>Inserisci le tue credenziali per accedere.</p>
        </div>

        <form method="post" action="../php/accesso.php">
            <div class="form-flex">
                <input type="email" name="email" placeholder="Indirizzo Email" required>
                <input type="password" name="password" placeholder="Password" required>

                <div class="options">
                    <a href="#avviso-sveglia">Password dimenticata?</a>
                </div>

                <button type="submit" class="btn-submit">Accedi</button>
            </div>
        </form>

        <div class="footer-text">
            Non hai un account? <a href="../html/reg.html">Registrati ora</a>
        </div>
    </div>

</body>
</html>
