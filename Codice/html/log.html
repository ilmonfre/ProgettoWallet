<!DOCTYPE html>

	<link rel="stylesheet" href="../css/styleLog.css">

</head>
<body>
    <div id="avviso-sveglia" class="custom-toast">
        <span>⏰</span>
        <p>Svegliati!</p>
        <span>⏰</span>

            <h2>Bentornato</h2>

                    <a href="#avviso-sveglia">Password dimenticata?</a>

                <button type="submit" class="btn-submit">Accedi</button>
            </div>
        </form>

        <div class="footer-text">
            Non hai un account? <a href="../html/reg.html">Registrati ora</a>
        </div>
    </div>

</body>
