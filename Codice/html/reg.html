<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Registrati</title>
	<link rel="stylesheet" href="../css/styleReg.css">
</head>
<body>

    <div class="registration-card">
        <div class="header">
            <h2>Registrati</h2>
            <p>Inserisci i tuoi dati per creare un nuovo account.</p>
        </div>

        <form method="post" action="../php/registrazione.php">
            <div class="form-grid">
                <input type="text" name="nome" placeholder="Nome" required>
                <input type="text" name="cognome" placeholder="Cognome" required>

                <input type="email" name="email" class="full-width" placeholder="Indirizzo Email" required>

                <input type="text" name="cf" placeholder="Codice Fiscale" pattern="^[A-Z]{6}[0-9]{2}[A-Z][0-9]{2}[A-Z][0-9]{3}[A-Z]$" required>
                <input type="date" name="data_nascita" required>

                <input type="password" name="password" placeholder="Password" required>
                <input type="password" name="password"  placeholder="Conferma Password" required>

                <button type="submit">Crea Account</button>
            </div>
        </form>
    </div>

</body>
</html>
</html>
